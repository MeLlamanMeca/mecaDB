name: Deploy mecaDB

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'raspberry-prod' || 'raspberry-staging' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Install cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.RASPBERRY_SSH_KEY }}
          HOST: ${{ secrets.RASPBERRY_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          cat <<EOF > ~/.ssh/config
          Host $HOST
              ProxyCommand /usr/local/bin/cloudflared access ssh --hostname %h
              StrictHostKeyChecking no
          EOF

      - name: Copy repo to Raspberry
        env:
          USER: ${{ secrets.RASPBERRY_USER }}
          HOST: ${{ secrets.RASPBERRY_HOST }}
        run: |
          tar -czf /tmp/repo.tar.gz --exclude='.git' --exclude='node_modules' --exclude='generated' .
          scp -i ~/.ssh/id_rsa -o ProxyCommand="/usr/local/bin/cloudflared access ssh --hostname $HOST" \
            /tmp/repo.tar.gz "$USER@$HOST:/tmp/repo.tar.gz"

      - name: Deploy
        env:
          USER: ${{ secrets.RASPBERRY_USER }}
          HOST: ${{ secrets.RASPBERRY_HOST }}
          APP_DIR: ${{ vars.APP_DIR }}
        run: |
          ssh -i ~/.ssh/id_rsa "$USER@$HOST" \
            -o SendEnv=APP_DIR \
            << REMOTEEOC
            set -eu
            mkdir -p $APP_DIR
            tar -xzf /tmp/repo.tar.gz -C $APP_DIR
            rm /tmp/repo.tar.gz
            cd $APP_DIR

            echo "ENVIRONMENT=${{ vars.ENVIRONMENT }}" > .env
            echo "DB_USER=${{ secrets.DB_USER }}" >> .env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            echo "DB_NAME=${{ vars.DB_NAME }}" >> .env
            echo "DATABASE_URL=postgresql://${{ secrets.DB_USER }}:${{ secrets.DB_PASSWORD }}@${{ vars.DB_HOST }}:${{ vars.DB_PORT }}/${{ vars.DB_NAME }}" >> .env

            chmod +x scripts/deploy.sh scripts/migrate.sh
            ./scripts/deploy.sh
            ./scripts/migrate.sh
          REMOTEEOC